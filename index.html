<!DOCTYPE html>

<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Multi-Monitor Window Demo</title>
  <style>
    body {
      font-family: sans-serif;
      padding: 24px;
    }

    button {
      padding: 12px 20px;
      font-size: 16px;
      cursor: pointer;
    }

    #status {
      margin-top: 16px;
      color: #444;
    }

  </style>
</head>
<body>

  <h1>Multi-Monitor Window Management Demo</h1>

  <button id="openWindows">
    Open Python on Monitor 1 and Apple on Monitor 2
  </button>

  <div id="status"></div>

  <script>
    const status = document.getElementById('status');

    async function openOnMonitors() {
      if (!('getScreenDetails' in window)) {
        status.textContent =
          'Window Management API is not supported in this browser.';
        return;
      }

      try {
        const screenDetails = await window.getScreenDetails();
        const screens = screenDetails.screens;

        const primaryScreen =
          screens.find(screen => screen.isPrimary) || screens[0];

        const secondaryScreen =
          screens.find(screen => !screen.isPrimary);

        // Open Python on primary monitor
        window.open(
          'https://docs.python.org/3/library/http.server.html',
          'python-window',
          [
            `left=${primaryScreen.availLeft}`,
            `top=${primaryScreen.availTop}`,
            `width=${primaryScreen.availWidth}`,
            `height=${primaryScreen.availHeight}`
          ].join(',')
        );

        if (secondaryScreen) {
          // Open Apple on secondary monitor
          window.open(
            'https://en.wikipedia.org/wiki/Fruit',
            'apple-window',
            [
              `left=${secondaryScreen.availLeft}`,
              `top=${secondaryScreen.availTop}`,
              `width=${secondaryScreen.availWidth}`,
              `height=${secondaryScreen.availHeight}`
            ].join(',')
          );

          status.textContent =
            'Opened Python on the primary monitor and Apple on the secondary monitor.';
        } else {
          // Only one monitor available
          window.open(
            'https://en.wikipedia.org/wiki/Fruit',
            'apple-window',
            [
              `left=${primaryScreen.availLeft}`,
              `top=${primaryScreen.availTop}`,
              `width=${Math.floor(primaryScreen.availWidth)}`,
              `height=${Math.floor(primaryScreen.availHeight)}`
            ].join(',')
          );

          status.textContent =
            'Only one monitor detected. Both windows were opened on the same display.';
        }
      } catch (err) {
        console.error(err);
        status.textContent =
          'Failed to access screen information. Permission may have been denied.';
      }
    }

    document
      .getElementById('openWindows')
      .addEventListener('click', openOnMonitors);
  </script>

</body>
</html>
