<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>WebRTC Grid</title>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #111;
      color: white;
      font-family: sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      padding: 10px;
      background: #1a1a1a;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    select {
      padding: 5px;
      background: #222;
      color: white;
      border: 1px solid #444;
    }

    .grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: repeat(4, 1fr);
      gap: 8px;
      padding: 8px;
    }

    .camera {
      position: relative;
      background: black;
      border: 1px solid #333;
      overflow: hidden;
    }

    .camera.empty {
      background: #0a0a0a;
      border: 1px dashed #222;
    }

    .camera video {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: black;
    }

    .label {
      position: absolute;
      top: 8px;
      left: 8px;
      background: rgba(0,0,0,0.7);
      padding: 4px 8px;
      border-radius: 4px;
      z-index: 10;
      font-size: 12px;
    }
  </style>
</head>

<body>

<div class="topbar">
  <label>Streams:</label>
  <select id="streamCount">
    <option value="1">1</option>
    <option value="2">2</option>
    <option value="3">3</option>
    <option value="4">4</option>
    <option value="5">5</option>
    <option value="6">6</option>
    <option value="7">7</option>
    <option value="8">8</option>
    <option value="9">9</option>
    <option value="10">10</option>
    <option value="11">11</option>
    <option value="12">12</option>
    <option value="13">13</option>
    <option value="14">14</option>
    <option value="15">15</option>
    <option value="16" selected>16</option>
  </select>
</div>

<div id="grid" class="grid"></div>

<script>
const pcMap = new Map();

function stopStream(id) {
  const pc = pcMap.get(id);
  if (pc) {
    pc.getSenders().forEach(s => s.track && s.track.stop());
    pc.close();
    pcMap.delete(id);
  }
}

async function startStream(videoElement, path, id) {
  const pc = new RTCPeerConnection();
  pcMap.set(id, pc);

  pc.ontrack = (event) => {
    videoElement.srcObject = event.streams[0];
  };

  const offer = await pc.createOffer({
    offerToReceiveVideo: true,
    offerToReceiveAudio: false
  });

  await pc.setLocalDescription(offer);

  await new Promise(resolve => {
    if (pc.iceGatheringState === "complete") return resolve();

    pc.onicegatheringstatechange = () => {
      if (pc.iceGatheringState === "complete") resolve();
    };
  });

  const response = await fetch(
    `http://localhost:8889/${path}/whep`,
    {
      method: "POST",
      headers: { "Content-Type": "application/sdp" },
      body: pc.localDescription.sdp
    }
  );

  const answer = await response.text();

  await pc.setRemoteDescription({
    type: "answer",
    sdp: answer
  });
}

async function buildGrid(count) {
  const grid = document.getElementById("grid");

  // Stop all streams
  for (let i = 0; i < 16; i++) stopStream(i);

  // Clear UI
  grid.innerHTML = "";

  for (let i = 0; i < 16; i++) {
    const camId = `cam${i}`;

    const container = document.createElement("div");
    container.className = "camera";

    const label = document.createElement("div");
    label.className = "label";
    label.innerText = camId.toUpperCase();

    const video = document.createElement("video");
    video.id = camId;
    video.autoplay = true;
    video.muted = true;
    video.playsInline = true;

    container.appendChild(label);
    container.appendChild(video);

    grid.appendChild(container);

    if (i < count) {
      startStream(video, camId, i);
    } else {
      container.classList.add("empty");
      video.remove(); // no stream for empty slots
    }
  }
}

// init
const selector = document.getElementById("streamCount");

buildGrid(parseInt(selector.value));

selector.addEventListener("change", () => {
  buildGrid(parseInt(selector.value));
});
</script>

</body>
</html>
