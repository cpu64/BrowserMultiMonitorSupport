<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>16 Stream Decode Grid</title>

  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: sans-serif;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 6px;
    }

    .cell {
      position: relative;
      background: black;
    }

    video {
      width: 100%;
      height: auto;
      display: block;
      background: black;
    }

    .label {
      position: absolute;
      top: 4px;
      left: 4px;
      font-size: 12px;
      background: rgba(0,0,0,0.6);
      padding: 2px 4px;
      border-radius: 3px;
      z-index: 2;
    }

    #controls {
      padding: 10px;
      background: #222;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    button {
      padding: 6px 12px;
      margin-right: 10px;
    }
  </style>
</head>

<body>

<div id="controls">
  <label>
    4K:
    <input id="count2160" type="number" min="0" value="0" style="width:60px">
  </label>

  <label>
    1080p:
    <input id="count1080" type="number" min="0" value="0" style="width:60px">
  </label>

  <label>
    480p:
    <input id="count480" type="number" min="0" value="0" style="width:60px">
  </label>

  <label>
    360p:
    <input id="count360" type="number" min="0" value="0" style="width:60px">
  </label>

  <button id="start">Start Streams</button>
  <button id="stop">Stop</button>
</div>

<div id="grid"></div>

<script>
const grid = document.getElementById("grid");
const videos = [];

function createPlayer(labelText, src) {
  const cell = document.createElement("div");
  cell.className = "cell";

  const label = document.createElement("div");
  label.className = "label";
  label.textContent = labelText;

  const video = document.createElement("video");

  video.src = src;
  video.autoplay = true;
  video.muted = true;
  video.loop = true;
  video.playsInline = true;
  video.controls = false;
  video.preload = "auto";

  video.addEventListener("error", () => {
    console.error(`${labelText} error`);

    console.log("src:", video.currentSrc);
    console.log("networkState:", video.networkState);
    console.log("readyState:", video.readyState);
    console.log("mediaError:", video.error);

    if (video.error) {
      console.log("code:", video.error.code);

      const codes = {
        1: "MEDIA_ERR_ABORTED",
        2: "MEDIA_ERR_NETWORK",
        3: "MEDIA_ERR_DECODE",
        4: "MEDIA_ERR_SRC_NOT_SUPPORTED"
      };

      console.log("meaning:", codes[video.error.code]);
    }
  });

  cell.appendChild(label);
  cell.appendChild(video);
  grid.appendChild(cell);

  return video;
}

function start() {
  stop();

  const count2160 = Number(document.getElementById("count2160").value) || 0;
  const count1080 = Number(document.getElementById("count1080").value) || 0;
  const count480  = Number(document.getElementById("count480").value) || 0;
  const count360  = Number(document.getElementById("count360").value) || 0;

  const streams = [];

  for (let i = 1; i <= count2160; i++) {
    streams.push({
      label: `2160p-${i}`,
      src: `streams_2160p/stream${i}_.m3u8`
    });
  }

  for (let i = 1; i <= count1080; i++) {
    streams.push({
      label: `1080p-${i}`,
      src: `streams_1080p/stream${i}_.m3u8`
    });
  }

  for (let i = 1; i <= count480; i++) {
    streams.push({
      label: `480p-${i}`,
      src: `streams_480p/stream${i}_.m3u8`
    });
  }

  for (let i = 1; i <= count360; i++) {
    streams.push({
      label: `360p-${i}`,
      src: `streams_360p/stream${i}_.m3u8`
    });
  }

  streams.forEach(stream => {
    const video = createPlayer(stream.label, stream.src);
    videos.push(video);

    video.play().catch(err => {
      console.warn(`Autoplay blocked for ${stream.label}`, err);
    });
  });
}

function stop() {
  videos.forEach(v => {
    v.pause();
    v.removeAttribute("src");
    v.load();
  });

  videos.length = 0;
  grid.innerHTML = "";
}

document.getElementById("start").onclick = start;
document.getElementById("stop").onclick = stop;
</script>

</body>
</html>
