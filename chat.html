<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Chat Window</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 800px;
      margin: 20px auto;
    }

    #messages {
      border: 1px solid #ccc;
      height: 300px;
      overflow-y: auto;
      padding: 10px;
      margin: 10px 0;
    }

    .msg {
      margin: 4px 0;
    }

    input {
      width: 80%;
      padding: 8px;
    }

    button {
      padding: 8px;
    }
  </style>
</head>
<body>
  <h1 id="title"></h1>

  <div id="messages"></div>

  <input id="text" placeholder="Type message..." />
  <button id="send">Send</button>

  <script>
    const params = new URLSearchParams(location.search);
    const sender = params.get("name") || "Chat";

    document.getElementById("title").textContent = sender;

    const channel = new BroadcastChannel("multi-monitor-chat");

    function getMessages() {
      return JSON.parse(localStorage.getItem("messages") || "[]");
    }

    function setMessages(messages) {
      localStorage.setItem("messages", JSON.stringify(messages));
    }

    function render() {
      const container = document.getElementById("messages");

      container.innerHTML = getMessages()
        .map(
          m => `<div class="msg"><strong>${m.sender}:</strong> ${m.text}</div>`
        )
        .join("");

      container.scrollTop = container.scrollHeight;
    }

    function addMessage(text) {
      const messages = getMessages();

      messages.push({
        sender,
        text,
        timestamp: Date.now()
      });

      setMessages(messages);

      channel.postMessage({
        type: "messages-updated"
      });

      render();
    }

    document.getElementById("send").onclick = () => {
      const input = document.getElementById("text");

      if (!input.value.trim()) {
        return;
      }

      addMessage(input.value);
      input.value = "";
    };

    channel.onmessage = event => {
      if (event.data.type === "messages-updated") {
        render();
      }
    };

    window.addEventListener("storage", render);

    render();
  </script>
</body>
</html>
